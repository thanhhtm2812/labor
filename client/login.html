<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — LaborConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Be Vietnam Pro', sans-serif; }
    .input-field {
      @apply w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all;
    }
    .btn-primary { @apply w-full bg-blue-800 hover:bg-blue-900 text-white font-semibold py-3 rounded-xl transition-all text-sm; }
    .error-msg { @apply text-red-500 text-xs mt-1; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-slate-100 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-8">
    <a href="index.html" class="text-2xl font-extrabold text-blue-800">Labor<span class="text-orange-500">Connect</span></a>
    <p class="text-gray-500 text-sm mt-1">Đăng nhập để tiếp tục</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-xl p-8">
    <h1 class="text-xl font-bold text-gray-800 mb-6">Đăng nhập tài khoản</h1>

    <!-- Alert -->
    <div id="alertBox" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-medium"></div>

    <!-- Form -->
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Email</label>
        <input id="email" type="email" placeholder="email@example.com"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" />
        <p id="emailErr" class="error-msg hidden">Email không hợp lệ</p>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Mật khẩu</label>
        <div class="relative">
          <input id="password" type="password" placeholder="••••••••"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 pr-11 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" />
          <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg">👁</button>
        </div>
        <p id="pwdErr" class="error-msg hidden">Mật khẩu tối thiểu 6 ký tự</p>
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-gray-600 cursor-pointer">
          <input type="checkbox" id="rememberMe" class="rounded" />
          Ghi nhớ đăng nhập
        </label>
        <a href="#" class="text-blue-600 hover:underline">Quên mật khẩu?</a>
      </div>

      <button onclick="handleLogin()" id="loginBtn"
        class="w-full bg-blue-800 hover:bg-blue-900 text-white font-semibold py-3 rounded-xl transition-all text-sm flex items-center justify-center gap-2">
        Đăng nhập
      </button>
    </div>

    <div class="mt-6 text-center text-sm text-gray-500">
      Chưa có tài khoản?
      <a href="register.html" class="text-blue-700 font-semibold hover:underline ml-1">Đăng ký ngay</a>
    </div>
  </div>

  <p class="text-center text-xs text-gray-400 mt-4">
    <a href="index.html" class="hover:text-blue-600">← Về trang chủ</a>
  </p>
</div>

<script>
  const API = 'http://localhost:5000/api';

  // Redirect nếu đã đăng nhập
  if (localStorage.getItem('lc_token')) {
    const user = JSON.parse(localStorage.getItem('lc_user') || '{}');
    redirectByRole(user.role);
  }

  function redirectByRole(role) {
    if (role === 'admin')    window.location.href = 'admin.html';
    else if (role === 'employer') window.location.href = 'dashboard-employer.html';
    else if (role === 'candidate') window.location.href = 'dashboard-candidate.html';
    else window.location.href = 'index.html';
  }

  function togglePwd() {
    const p = document.getElementById('password');
    p.type = p.type === 'password' ? 'text' : 'password';
  }

  function showAlert(msg, type = 'error') {
    const box = document.getElementById('alertBox');
    box.className = `mb-4 px-4 py-3 rounded-xl text-sm font-medium ${type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`;
    box.textContent = msg;
    box.classList.remove('hidden');
  }

  async function handleLogin() {
    // Reset errors
    document.getElementById('emailErr').classList.add('hidden');
    document.getElementById('pwdErr').classList.add('hidden');
    document.getElementById('alertBox').classList.add('hidden');

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    // Client-side validation
    let valid = true;
    if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
      document.getElementById('emailErr').classList.remove('hidden'); valid = false;
    }
    if (password.length < 6) {
      document.getElementById('pwdErr').classList.remove('hidden'); valid = false;
    }
    if (!valid) return;

    // Submit
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span> Đang đăng nhập...';

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!data.success) {
        showAlert(data.message || 'Đăng nhập thất bại');
        return;
      }

      // Lưu token & user
      localStorage.setItem('lc_token', data.token);
      localStorage.setItem('lc_user', JSON.stringify(data.user));

      showAlert('Đăng nhập thành công! Đang chuyển hướng...', 'success');
      setTimeout(() => redirectByRole(data.user.role), 800);

    } catch (err) {
      showAlert('Không thể kết nối đến server. Vui lòng thử lại.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Đăng nhập';
    }
  }

  // Enter to submit
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
