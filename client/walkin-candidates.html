<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý ứng viên vãng lai — LaborConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Be Vietnam Pro', sans-serif; }
    .input-base { width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:.875rem; }
    .input-base:focus { outline:2px solid #1e40af;outline-offset:2px; }
    .label-xs { display:block;font-size:.7rem;font-weight:600;color:#6b7280;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

<script>
  const token = localStorage.getItem('lc_token');
  const user  = JSON.parse(localStorage.getItem('lc_user') || 'null');
  if (!token || !user || user.role !== 'employer') { window.location.href = 'login.html'; }
</script>

<!-- NAVBAR -->
<nav class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="dashboard-employer.html" class="text-sm font-medium text-gray-600 hover:text-blue-800 flex items-center gap-1">← Về Dashboard</a>
      <span class="h-4 w-px bg-gray-300"></span>
      <span class="font-bold text-gray-800">Ứng viên vãng lai</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-sm text-gray-600 hidden md:inline">Đang đăng nhập: <strong id="currentUserDisplay"></strong></span>
    </div>
  </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-8">
  <div id="globalAlert" class="hidden mb-5 px-4 py-3 rounded-xl text-sm font-medium"></div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
    
    <!-- Form tạo mới -->
    <div class="md:col-span-1">
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 sticky top-24">
        <h2 class="text-lg font-bold text-gray-800 mb-4">Tạo tài khoản ứng viên</h2>
        <p class="text-xs text-gray-500 mb-4">Hệ thống sẽ tự động sinh mật khẩu ngẫu nhiên và liên kết với tài khoản Employer của bạn.</p>
        
        <div class="space-y-4">
          <div>
            <label class="label-xs">Họ và tên *</label>
            <input id="wk_name" type="text" class="input-base" placeholder="Nguyễn Văn A" />
          </div>
          <div>
            <label class="label-xs">Email (Tùy chọn)</label>
            <input id="wk_email" type="email" class="input-base" placeholder="Để trống sẽ tự sinh email" />
          </div>
          <button onclick="createWalkin()" id="createBtn" 
            class="w-full bg-blue-800 hover:bg-blue-900 text-white font-bold py-3 rounded-xl transition-all shadow-md text-sm">
            ⚡ Tạo & Thêm vào danh sách
          </button>
        </div>
      </div>
    </div>

    <!-- Danh sách -->
    <div class="md:col-span-2">
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div class="p-5 border-b border-gray-100 flex justify-between items-center">
          <h2 class="font-bold text-gray-800">Danh sách ứng viên đã tạo</h2>
          <button onclick="loadWalkins()" class="text-xs text-blue-600 hover:underline">🔄 Làm mới</button>
        </div>
        <div id="walkinList" class="divide-y divide-gray-50">
          <div class="p-8 text-center text-gray-400 text-sm">Đang tải dữ liệu...</div>
        </div>
      </div>
    </div>

  </div>
</main>

<script>
  const API = 'http://localhost:5000/api';
  if (user) document.getElementById('currentUserDisplay').textContent = user.displayName || user.email;
  
  function authHeader() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }; }

  function showAlert(msg, type = 'success') {
    const box = document.getElementById('globalAlert');
    box.className = `mb-5 px-4 py-3 rounded-xl text-sm font-medium ${type==='success'?'bg-green-50 text-green-700 border border-green-200':'bg-red-50 text-red-700 border border-red-200'}`;
    box.textContent = msg; box.classList.remove('hidden');
    setTimeout(() => box.classList.add('hidden'), 4000);
  }

  // --- LOAD DANH SÁCH ---
  async function loadWalkins() {
    const container = document.getElementById('walkinList');
    try {
      const r = await fetch(`${API}/employer/walk-in-candidates`, { headers: authHeader() });
      const d = await r.json();
      
      if (!d.success || !d.users.length) {
        container.innerHTML = `<div class="p-8 text-center text-gray-400">
          <div class="text-4xl mb-2">👥</div>
          <p class="text-sm">Chưa có ứng viên vãng lai nào.</p>
        </div>`;
        return;
      }

      container.innerHTML = d.users.map(u => `
        <div class="p-5 flex items-center justify-between hover:bg-gray-50 transition-colors group">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-sm">
              ${(u.candidateProfile?.fullName || 'U').charAt(0).toUpperCase()}
            </div>
            <div>
              <p class="font-bold text-gray-800 text-sm">${u.candidateProfile?.fullName || 'Không tên'}</p>
              <p class="text-xs text-gray-500 font-mono">${u.email}</p>
              <p class="text-[10px] text-gray-400 mt-0.5">Tạo lúc: ${new Date(u.createdAt).toLocaleTimeString('vi-VN')} ${new Date(u.createdAt).toLocaleDateString('vi-VN')}</p>
            </div>
          </div>
          <button onclick="loginAsCandidate('${u._id}')" 
            class="bg-orange-500 hover:bg-orange-600 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-sm transition-all flex items-center gap-1">
            🚀 Đăng nhập ngay
          </button>
        </div>
      `).join('');
    } catch (e) {
      container.innerHTML = `<p class="p-5 text-red-500 text-sm text-center">Lỗi kết nối</p>`;
    }
  }

  // --- TẠO ỨNG VIÊN ---
  async function createWalkin() {
    const fullName = document.getElementById('wk_name').value.trim();
    const email    = document.getElementById('wk_email').value.trim();
    
    if (!fullName) { showAlert('Vui lòng nhập tên ứng viên', 'error'); return; }

    const btn = document.getElementById('createBtn');
    btn.disabled = true; btn.textContent = 'Đang tạo...';

    try {
      const r = await fetch(`${API}/employer/walk-in-candidates`, {
        method: 'POST', headers: authHeader(),
        body: JSON.stringify({ fullName, email })
      });
      const d = await r.json();
      
      if (d.success) {
        showAlert(`✅ Đã tạo ứng viên: ${d.user.candidateProfile.fullName}`);
        document.getElementById('wk_name').value = '';
        document.getElementById('wk_email').value = '';
        loadWalkins();
      } else {
        showAlert(d.message || 'Tạo thất bại', 'error');
      }
    } catch (e) { showAlert('Lỗi kết nối', 'error'); } 
    finally { btn.disabled = false; btn.textContent = '⚡ Tạo & Thêm vào danh sách'; }
  }

  // --- ĐĂNG NHẬP VỚI TƯ CÁCH CANDIDATE (AUTO SWITCH) ---
  async function loginAsCandidate(userId) {
    if (!confirm('Bạn sẽ bị ĐĂNG XUẤT khỏi tài khoản Employer và đăng nhập ngay vào tài khoản ứng viên này. Tiếp tục?')) return;

    try {
      // Gọi API lấy token đăng nhập của candidate
      const r = await fetch(`${API}/employer/walk-in-candidates/${userId}/switch-token`, {
        method: 'POST', headers: authHeader()
      });
      const d = await r.json();

      if (d.success) {
        // 1. Xóa token employer
        localStorage.removeItem('lc_token');
        localStorage.removeItem('lc_user');

        // 2. Lưu token candidate
        localStorage.setItem('lc_token', d.token);
        localStorage.setItem('lc_user', JSON.stringify(d.user));

        // 3. Chuyển hướng
        window.location.href = 'dashboard-candidate.html';
      } else {
        showAlert(d.message || 'Không thể chuyển đổi tài khoản', 'error');
      }
    } catch (e) {
      showAlert('Lỗi kết nối server', 'error');
    }
  }

  loadWalkins();
</script>
</body>
</html>
