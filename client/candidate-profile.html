<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hồ sơ ứng viên — LaborConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Be Vietnam Pro', sans-serif; }
    .tab-btn.active { border-bottom: 3px solid #1e3a5f; color: #1e3a5f; font-weight: 700; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .verify-unverified { background:#f3f4f6; color:#6b7280; }
    .verify-pending    { background:#fef9c3; color:#b45309; }
    .verify-pending_admin    { background:#fef9c3; color:#b45309; }
    .verify-pending_employer { background:#dbeafe; color:#1d4ed8; }
    .verify-verified   { background:#dcfce7; color:#16a34a; }
    .verify-rejected   { background:#fee2e2; color:#dc2626; }
    .skill-chip { display:inline-flex; align-items:center; gap:4px; font-size:.75rem; font-weight:500; padding:4px 10px; border-radius:999px; background:#eff6ff; color:#1d4ed8; }
  </style>
</head>
<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="index.html" class="font-extrabold text-xl text-blue-900">Labor<span class="text-orange-500">Connect</span></a>
    <button onclick="history.back()" class="text-sm text-blue-700 hover:underline">← Quay lại</button>
  </div>
</nav>

<!-- LOADING -->
<div id="loadingState" class="max-w-5xl mx-auto px-4 py-16 text-center text-gray-400">
  <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-200 border-t-blue-800 mx-auto mb-4"></div>
  <p>Đang tải hồ sơ ứng viên...</p>
</div>

<!-- ERROR -->
<div id="errorState" class="hidden max-w-5xl mx-auto px-4 py-16 text-center">
  <div class="text-5xl mb-4">😞</div>
  <p class="text-lg text-gray-500">Không tìm thấy hồ sơ ứng viên</p>
  <button onclick="history.back()" class="mt-4 inline-block text-blue-600 hover:underline">← Quay lại</button>
</div>

<!-- PROFILE PAGE -->
<div id="profilePage" class="hidden">

  <!-- HEADER -->
  <div class="bg-gradient-to-r from-blue-900 to-blue-700 h-32"></div>
  <div class="bg-white border-b shadow-sm">
    <div class="max-w-5xl mx-auto px-4 pt-0 pb-5">
      <div class="flex flex-col md:flex-row md:items-end gap-4 -mt-10">
        <img id="candidateAvatar" src="https://via.placeholder.com/96?text=UV"
          class="w-24 h-24 rounded-2xl border-4 border-white shadow-lg object-cover bg-white flex-shrink-0" />
        <div class="flex-1 pb-1">
          <h1 id="candidateName" class="text-2xl font-extrabold text-gray-900"></h1>
          <div id="candidateMeta" class="flex flex-wrap gap-3 mt-1.5 text-sm text-gray-500"></div>
        </div>
        <div id="actionButtons" class="flex gap-2 flex-shrink-0 pb-1"></div>
      </div>

      <!-- TABS -->
      <div class="flex gap-6 border-t mt-4 pt-0">
        <button class="tab-btn active py-3 text-sm" onclick="switchTab('overview', event)">Tổng quan</button>
        <button class="tab-btn py-3 text-sm text-gray-500" onclick="switchTab('cvs', event)">CV công khai</button>
        <button class="tab-btn py-3 text-sm text-gray-500" onclick="switchTab('skills', event)">Kỹ năng</button>
      </div>
    </div>
  </div>

  <!-- TAB CONTENT -->
  <div class="max-w-5xl mx-auto px-4 py-8">

    <!-- TAB: TỔNG QUAN -->
    <div id="tab-overview" class="tab-content active grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-6">

        <!-- Giới thiệu -->
        <div id="bioSection" class="hidden bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
          <h2 class="font-bold text-gray-700 mb-3 text-sm uppercase tracking-wide">Giới thiệu bản thân</h2>
          <p id="candidateBio" class="text-sm text-gray-600 leading-relaxed"></p>
        </div>

        <!-- Học vấn -->
        <div id="educationSection" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
          <h2 class="font-bold text-gray-700 mb-4 text-sm uppercase tracking-wide">🎓 Học vấn</h2>
          <div id="educationList" class="space-y-4"></div>
        </div>

        <!-- Kinh nghiệm -->
        <div id="experienceSection" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
          <h2 class="font-bold text-gray-700 mb-4 text-sm uppercase tracking-wide">💼 Kinh nghiệm</h2>
          <div id="experienceList" class="space-y-4"></div>
        </div>
      </div>

      <!-- Sidebar info -->
      <div class="space-y-4">
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
          <h3 class="font-bold text-gray-700 mb-3 text-sm uppercase tracking-wide">Thông tin</h3>
          <ul id="infoList" class="space-y-2.5 text-sm text-gray-600"></ul>
        </div>
        <div id="desiredJobSection" class="hidden bg-orange-50 border border-orange-100 rounded-2xl p-5">
          <h3 class="font-semibold text-orange-700 mb-2 text-sm">🎯 Mong muốn</h3>
          <div id="desiredJobInfo" class="text-sm text-orange-600 space-y-1"></div>
        </div>
      </div>
    </div>

    <!-- TAB: CV CÔNG KHAI -->
    <div id="tab-cvs" class="tab-content">
      <div id="cvPublicList" class="space-y-4"></div>
    </div>

    <!-- TAB: KỸ NĂNG -->
    <div id="tab-skills" class="tab-content">
      <div id="skillsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:5000/api';
  const urlParams    = new URLSearchParams(window.location.search);
  const candidateId  = urlParams.get('id') || urlParams.get('candidate');
  const token        = localStorage.getItem('lc_token');
  const currentUser  = JSON.parse(localStorage.getItem('lc_user') || 'null');

  const VERIFY_LABEL = {
    unverified:       '○ Chưa xác minh',
    pending:          '⏳ Chờ duyệt',
    pending_admin:    '⏳ Chờ Admin duyệt',
    pending_employer: '⏳ Chờ Employer duyệt',
    verified:         '✓ Đã xác minh',
    rejected:         '✗ Từ chối',
  };

  function switchTab(name, event) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    if (event?.currentTarget) event.currentTarget.classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
  }

  async function loadProfile() {
    if (!candidateId) { showError(); return; }

    try {
      // Gọi API lấy thông tin candidate — dùng endpoint tìm kiếm CV của employer
      // hoặc nếu là chính candidate thì dùng /auth/me
      let data;
      if (currentUser?.role === 'candidate' && currentUser?._id === candidateId) {
        const r = await fetch(`${API}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
        data = await r.json();
        if (!data.success) { showError(); return; }
        renderProfile(data.user, true);
      } else {
        // Employer hoặc admin xem — gọi search CVs với id cụ thể
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
        const r = await fetch(`${API}/employer/search-cvs?limit=100`, { headers });
        const d = await r.json();
        const candidate = (d.candidates || []).find(c => c._id === candidateId);
        if (!candidate) { showError(); return; }
        renderProfile(candidate, false);
      }

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('profilePage').classList.remove('hidden');
    } catch (err) {
      console.error(err);
      showError();
    }
  }

  function showError() {
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('errorState').classList.remove('hidden');
  }

  function renderProfile(user, isOwn) {
    const cp = user.candidateProfile || {};

    document.title = `${cp.fullName || 'Ứng viên'} — LaborConnect`;

    // Avatar & name
    const avatar = cp.avatar || 'https://via.placeholder.com/96?text=UV';
    document.getElementById('candidateAvatar').src = avatar;
    document.getElementById('candidateName').textContent = cp.fullName || user.email || '—';

    // Meta chips
    const metas = [
      cp.province?.name && `📍 ${cp.province.name}`,
      cp.desiredSalary?.min && `💰 ${(cp.desiredSalary.min/1e6).toFixed(0)}–${(cp.desiredSalary.max/1e6).toFixed(0)} triệu`,
    ].filter(Boolean);
    document.getElementById('candidateMeta').innerHTML = metas.map(m =>
      `<span class="bg-gray-100 rounded-full px-3 py-1 text-xs">${m}</span>`
    ).join('');

    // Action buttons
    if (currentUser?.role === 'employer' && !isOwn) {
      document.getElementById('actionButtons').innerHTML = `
        <a href="mailto:${user.email}" class="px-4 py-2 bg-blue-800 text-white text-sm font-semibold rounded-xl hover:bg-blue-900">
          ✉️ Liên hệ
        </a>`;
    }

    // Bio
    if (cp.bio) {
      document.getElementById('bioSection').classList.remove('hidden');
      document.getElementById('candidateBio').textContent = cp.bio;
    }

    // Info sidebar
    const infoItems = [
      { icon:'📧', label:'Email',       value: user.email || '—' },
      { icon:'📞', label:'Điện thoại', value: cp.phone   || '—' },
      { icon:'📅', label:'Ngày sinh',  value: cp.dateOfBirth ? new Date(cp.dateOfBirth).toLocaleDateString('vi-VN') : '—' },
      { icon:'⚧',  label:'Giới tính',  value: { male:'Nam', female:'Nữ', other:'Khác' }[cp.gender] || '—' },
    ];
    document.getElementById('infoList').innerHTML = infoItems.map(i =>
      `<li class="flex items-start gap-2">
        <span class="w-5 flex-shrink-0">${i.icon}</span>
        <span><span class="text-gray-400">${i.label}:</span> <strong class="text-gray-700">${i.value}</strong></span>
      </li>`
    ).join('');

    // Desired job
    if (cp.desiredSalary?.min || (cp.desiredWorkTypes || []).length) {
      document.getElementById('desiredJobSection').classList.remove('hidden');
      const infos = [];
      if (cp.desiredSalary?.min) infos.push(`Lương: ${(cp.desiredSalary.min/1e6).toFixed(0)}–${(cp.desiredSalary.max/1e6).toFixed(0)} triệu`);
      document.getElementById('desiredJobInfo').innerHTML = infos.map(i=>`<p>${i}</p>`).join('');
    }

    // Education
    const edus = cp.education || [];
    if (edus.length) {
      document.getElementById('educationList').innerHTML = edus.map(e => {
        const vs = e.verifyStatus || 'unverified';
        return `<div class="border-l-4 ${vs === 'verified' ? 'border-green-400' : 'border-gray-200'} pl-4 pb-1">
          <div class="flex items-center gap-2 flex-wrap">
            <p class="font-semibold text-gray-800">${e.school || '—'}</p>
            <span class="text-xs px-2 py-0.5 rounded-full verify-${vs}">${VERIFY_LABEL[vs] || vs}</span>
          </div>
          <p class="text-sm text-gray-600">${[e.degree, e.major].filter(Boolean).join(' · ')}</p>
          ${e.gpa ? `<p class="text-xs text-gray-400 mt-0.5">GPA: ${e.gpa}/4.0</p>` : ''}
          ${e.from ? `<p class="text-xs text-gray-400">${new Date(e.from).getFullYear()} — ${e.to ? new Date(e.to).getFullYear() : 'Hiện tại'}</p>` : ''}
          ${(e.images||[]).length ? `<div class="flex gap-2 mt-2">${e.images.map(img=>`<a href="${img}" target="_blank"><img src="${img}" class="h-14 w-20 object-cover rounded-lg border border-gray-200 hover:opacity-80" /></a>`).join('')}</div>` : ''}
        </div>`;
      }).join('');
    } else {
      document.getElementById('educationList').innerHTML = '<p class="text-gray-400 text-sm">Chưa cập nhật học vấn</p>';
    }

    // Experience
    const exps = cp.experience || [];
    if (exps.length) {
      document.getElementById('experienceList').innerHTML = exps.map(e => {
        const vs = e.verifyStatus || 'unverified';
        return `<div class="border-l-4 ${vs === 'verified' ? 'border-blue-400' : 'border-gray-200'} pl-4 pb-1">
          <div class="flex items-center gap-2 flex-wrap">
            <p class="font-semibold text-gray-800">${e.position || '—'} tại ${e.company || '—'}</p>
            <span class="text-xs px-2 py-0.5 rounded-full verify-${vs}">${VERIFY_LABEL[vs] || vs}</span>
          </div>
          ${e.from ? `<p class="text-xs text-gray-400">${new Date(e.from).toLocaleDateString('vi-VN')} — ${e.to ? new Date(e.to).toLocaleDateString('vi-VN') : 'Hiện tại'}</p>` : ''}
          ${e.description ? `<p class="text-sm text-gray-600 mt-1 line-clamp-3">${e.description}</p>` : ''}
        </div>`;
      }).join('');
    } else {
      document.getElementById('experienceList').innerHTML = '<p class="text-gray-400 text-sm">Chưa cập nhật kinh nghiệm</p>';
    }

    // CV công khai
    const pubCvs = (cp.cvList || []).filter(cv => cv.isPublic !== false);
    if (pubCvs.length) {
      document.getElementById('cvPublicList').innerHTML = pubCvs.map(cv => {
        const skills = (cv.skills || []).map(s => typeof s === 'object' ? s.name : s).filter(Boolean);
        const edu    = (cv.education || []);
        const exp    = (cv.experience || []);
        return `
          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
            <div class="flex items-start justify-between gap-4 mb-4">
              <div>
                <h3 class="font-bold text-gray-800 text-lg">${cv.title}</h3>
                ${cv.desiredPosition ? `<p class="text-sm text-gray-500 mt-0.5">🎯 ${cv.desiredPosition}</p>` : ''}
                ${cv.desiredSalary?.min ? `<p class="text-sm text-orange-600 font-medium">💰 ${(cv.desiredSalary.min/1e6).toFixed(0)}–${(cv.desiredSalary.max/1e6).toFixed(0)} triệu VND</p>` : ''}
              </div>
              <span class="text-xs bg-green-50 text-green-700 px-2.5 py-1 rounded-full font-medium flex-shrink-0">🌐 Công khai</span>
            </div>

            ${cv.summary ? `<p class="text-sm text-gray-600 mb-4 leading-relaxed">${cv.summary}</p>` : ''}

            ${skills.length ? `
              <div class="mb-4">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Kỹ năng</p>
                <div class="flex flex-wrap gap-2">
                  ${skills.map(s=>`<span class="skill-chip">${s}</span>`).join('')}
                </div>
              </div>` : ''}

            ${edu.length ? `
              <div class="mb-4">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">🎓 Học vấn</p>
                ${edu.map(e => `<div class="text-sm text-gray-700 py-1 border-b border-gray-50 last:border-0">
                  <span class="font-medium">${e.school || '—'}</span>
                  ${e.degree ? ` · ${e.degree}` : ''}
                  ${e.major  ? ` · ${e.major}` : ''}
                  ${e.gpa    ? ` · GPA ${e.gpa}` : ''}
                  <span class="text-xs px-1.5 py-0.5 rounded-full ml-1 verify-${e.verifyStatus||'unverified'}">${VERIFY_LABEL[e.verifyStatus||'unverified']}</span>
                </div>`).join('')}
              </div>` : ''}

            ${exp.length ? `
              <div>
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">💼 Kinh nghiệm</p>
                ${exp.map(e => `<div class="text-sm text-gray-700 py-1 border-b border-gray-50 last:border-0">
                  <span class="font-medium">${e.position || '—'}</span> tại <span class="font-medium">${e.company || '—'}</span>
                  ${e.from ? ` · ${new Date(e.from).getFullYear()}–${e.to ? new Date(e.to).getFullYear() : 'nay'}` : ''}
                  <span class="text-xs px-1.5 py-0.5 rounded-full ml-1 verify-${e.verifyStatus||'unverified'}">${VERIFY_LABEL[e.verifyStatus||'unverified']}</span>
                </div>`).join('')}
              </div>` : ''}
          </div>`;
      }).join('');
    } else {
      document.getElementById('cvPublicList').innerHTML = '<div class="text-center text-gray-400 py-12"><div class="text-4xl mb-3">📄</div><p>Không có CV công khai nào</p></div>';
    }

    // Skills tab
    const skills = cp.skills || [];
    if (skills.length) {
      document.getElementById('skillsList').innerHTML = skills.map(s => {
        const name    = typeof s === 'object' ? s.name    : s;
        const level   = typeof s === 'object' ? s.level   : '';
        const cert    = typeof s === 'object' ? s.certificate : '';
        const certUrl = typeof s === 'object' ? s.certUrl : '';
        const projs   = typeof s === 'object' ? (s.projects || []) : [];
        const levelLabel = { basic:'Cơ bản', intermediate:'Trung bình', advanced:'Nâng cao', expert:'Chuyên gia' }[level] || '';
        const levelPct   = { basic:25, intermediate:50, advanced:75, expert:100 }[level] || 50;
        return `
          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
            <div class="flex items-center justify-between mb-2">
              <h3 class="font-bold text-gray-800">${name}</h3>
              ${levelLabel ? `<span class="text-xs text-blue-600 font-medium">${levelLabel}</span>` : ''}
            </div>
            ${level ? `<div class="w-full bg-gray-100 rounded-full h-1.5 mb-3">
              <div class="bg-blue-600 h-1.5 rounded-full" style="width:${levelPct}%"></div>
            </div>` : ''}
            ${cert ? `<p class="text-xs text-gray-500">🏅 ${certUrl ? `<a href="${certUrl}" target="_blank" class="text-blue-600 hover:underline">${cert}</a>` : cert}</p>` : ''}
            ${projs.length ? `<div class="mt-2"><p class="text-xs text-gray-400 mb-1">Dự án:</p><div class="flex flex-wrap gap-1">${projs.map(p=>`<span class="text-xs bg-gray-50 text-gray-600 px-2 py-0.5 rounded-full border border-gray-100">${p}</span>`).join('')}</div></div>` : ''}
          </div>`;
      }).join('');
    } else {
      document.getElementById('skillsList').innerHTML = '<div class="col-span-2 text-center text-gray-400 py-12"><p>Chưa cập nhật kỹ năng</p></div>';
    }
  }

  loadProfile();
</script>
</body>
</html>
